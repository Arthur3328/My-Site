<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title> <!-- Título atualizado -->
    <style>
        body {
            margin: 0; /* Remove margens padrão */
            font-family: Arial, sans-serif; /* Fonte do texto */
            background-color: white; /* Cor de fundo da página */
        }
        .barra-preta {
            background-color: black; /* Cor de fundo preta */
            color: white; /* Texto branco */
            padding: 15px; /* Espaçamento interno */
            position: fixed; /* Fixa a barra no topo */
            top: 0; /* Alinha a barra no topo */
            width: 100%; /* Ocupa toda a largura da tela */
            text-align: center; /* Centraliza o texto */
            z-index: 1000; /* Garante que a barra fique sobre outros elementos */
        }
        .conteudo {
            padding-top: 60px; /* Adiciona espaço abaixo da barra para o conteúdo */
            text-align: center; /* Centraliza o conteúdo */
        }
    </style>
</head>
<body>
    <div class="barra-preta"><
    </div>
    <div class="conteudo">
        <h1>Bem-vindo ao Meu Site</h1>
        <p>Este é o conteúdo do meu site com uma barra preta fixa no topo.</p>
        <h2>Novidades</h2>
        <p>Novidades Em Breve</p>    
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página de Exemplo</title>
    <style>
        body {
            background-color: rgb(170, 179, 176); /* Fundo cinza */
            color: white; /* Texto branco */
            font-family: Arial, sans-serif; /* Fonte do texto */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center; /* Centraliza o texto */
        }
        .imagem-centralizada {
            display: block;
            margin-left: auto;
            margin-right: auto;
            width: 50%; /* Largura da imagem ajustável */
        }
    </style>
</head>
<body>
    <h1>Bem-vindo à Minha Página</h1>
    <img src="channels4_profile(10).jpg" alt="Uma bela paisagem" class="imagem-centralizada">
</body>
</html>
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Vídeo ao Site</title>
    <style>
        body {
            background-color: #f4f4f4; /* Cor de fundo */
            color: #333; /* Cor do texto */
            font-family: Arial, sans-serif; /* Fonte do texto */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center; /* Centraliza o texto */
        }
        video {
            width: 80%; /* Largura do vídeo */
            max-width: 600px; /* Largura máxima do vídeo */
            border: 2px solid #333; /* Borda ao redor do vídeo */
            border-radius: 5px; /* Bordas arredondadas */
        }
    </style>
</head>
<body>
    <h1>Meu Vídeo</h1>
    <video controls>
        <source src="meu-video.mp4" type="video/mp4">
        Seu navegador não suporta o elemento de vídeo.
    </video>
</body>
</html>
